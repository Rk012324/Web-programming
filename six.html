<!DOCTYPE html>
<html>
<head>
<title>Student Information System</title>

<style>
body{
font-family: Arial;
}

table{
border-collapse: collapse;
margin-top:20px;
}

th, td{
border:1px solid black;
padding:8px;
text-align:center;
}

#studentInfo{
position:absolute;
top:10px;
right:10px;
border:1px solid black;
padding:5px;
}
</style>

<script>

var students = [];

function Student(name, regno, course)
{
this.name = name;
this.regno = regno;
this.course = course;

this.getDetails = function()
{
return [this.name, this.regno, this.course];
}
}

function addStudent(form)
{
var name = form.sname.value;
var reg = form.regno.value;
var course = form.course.value;

var s = new Student(name, reg, course);

students.push(s);

displayStudents();

form.reset();
form.sname.focus();
}

function displayStudents()
{
var table = "<table>";
table += "<tr><th>Name</th><th>Reg No</th><th>Course</th></tr>";

for(var i=0;i<students.length;i++)
{
var data = students[i].getDetails();

table += "<tr>";
table += "<td>" + data[0] + "</td>";
table += "<td>" + data[1] + "</td>";
table += "<td>" + data[2] + "</td>";
table += "</tr>";
}

table += "</table>";

document.getElementById("result").innerHTML = table;
}

</script>

</head>

<body>

<h2>Student Information System</h2>

<form>

Name:
<input type="text" name="sname"><br><br>

Reg No:
<input type="text" name="regno"><br><br>

Course:
<select name="course">
<option value="CSE">CSE</option>
<option value="ECE">ECE</option>
<option value="IT">IT</option>
<option value="ME">ME</option>
</select>

<br><br>

<button type="button" onclick="addStudent(this.form)">Add Student</button>

</form>

<div id="result"></div>

<table id="studentInfo">
<tr>
<td><b>Name</b></td>
<td>Rishikesh Kumar</td>
</tr>
<tr>
<td><b>Reg No</b></td>
<td>24BCE0187</td>
</tr>
</table>

</body>
</html>
