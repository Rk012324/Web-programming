<!DOCTYPE html>
<html>
<head>
<title>Simple Calculator</title>

<script>
function calculate(operation)
{
    var num1 = parseFloat(document.getElementById("num1").value);
    var num2 = parseFloat(document.getElementById("num2").value);
    var result;

    switch(operation)
    {
        case "add":
            result = num1 + num2;
            break;

        case "sub":
            result = num1 - num2;
            break;

        case "mul":
            result = num1 * num2;
            break;

        case "div":
            if(num2 == 0)
            {
                result = "Cannot divide by zero";
            }
            else
            {
                result = num1 / num2;
            }
            break;
    }

    document.getElementById("output").innerHTML = "Result: " + result;
}
</script>

<style>
#studentInfo{
position:absolute;
top:10px;
right:10px;
border:1px solid black;
padding:5px;
}
</style>

</head>

<body>

<h2>Simple Calculator</h2>

Number 1: <input type="number" id="num1" step="any"><br><br>
Number 2: <input type="number" id="num2" step="any"><br><br>

<button onclick="calculate('add')">Add</button>
<button onclick="calculate('sub')">Subtract</button>
<button onclick="calculate('mul')">Multiply</button>
<button onclick="calculate('div')">Divide</button>

<p id="output"></p>

<table id="studentInfo">
<tr>
<td><b>Name</b></td>
<td>Rishikesh Kumar</td>
</tr>
<tr>
<td><b>Reg No</b></td>
<td>24BCE0187</td>
</tr>
</table>

</body>
</html>
