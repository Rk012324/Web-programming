<!DOCTYPE html>
<html>
<head>
<title>Background Color Changer</title>

<script>
function changeColor(color)
{
    document.body.style.backgroundColor = color;
}
</script>

<style>
#studentInfo{
position:absolute;
top:10px;
right:10px;
border:1px solid black;
border-collapse:collapse;
padding:5px;
}
</style>

</head>

<body>

<h2>Background Color Changer</h2>

<button type="button" onclick="changeColor('red')">Red</button>
<button type="button" onclick="changeColor('green')">Green</button>
<button type="button" onclick="changeColor('blue')">Blue</button>

<table id="studentInfo">
<tr>
<td><b>Name</b></td>
<td>Rishikesh Kumar</td>
</tr>
<tr>
<td><b>Reg No</b></td>
<td>24BCE0187</td>
</tr>
</table>

</body>
</html>
