<!DOCTYPE html>
<html>
<head>
<title>Simple Interest Calculator</title>

<script>
function calculateSI()
{
    var p = parseFloat(document.getElementById("principal").value);
    var r = parseFloat(document.getElementById("rate").value);
    var t = parseFloat(document.getElementById("time").value);

    var si = (p * r * t) / 100;

    document.getElementById("result").innerHTML = "Simple Interest = " + si;
}
</script>

<style>
#studentInfo{
position:absolute;
top:10px;
right:10px;
border:1px solid black;
padding:5px;
}
</style>

</head>

<body>

<h2>Simple Interest Calculator</h2>

Principal: <input type="number" id="principal"><br><br>
Rate: <input type="number" id="rate"><br><br>
Time: <input type="number" id="time"><br><br>

<button onclick="calculateSI()">Calculate SI</button>

<p id="result"></p>

</body>
</html>
