<!DOCTYPE html>
<html>
<head>
<title>Text Styling Application</title>

<style>
.bold{
font-weight: bold;
}

.italic{
font-style: italic;
}

.smallcaps{
font-variant: small-caps;
}

#studentInfo{
position:absolute;
top:10px;
right:10px;
border:1px solid black;
padding:5px;
}
</style>

<script>
function applyStyle(style)
{
    document.getElementById("message").className = style;
}
</script>

</head>

<body>

<h2>Text Styling Application</h2>

<p id="message">This is a sample message for styling.</p>

<fieldset>
<legend>Text Styles</legend>

<button onclick="applyStyle('bold')">Bold</button>
<button onclick="applyStyle('italic')">Italic</button>
<button onclick="applyStyle('smallcaps')">Small Caps</button>

</fieldset>

<table id="studentInfo">
<tr>
<td><b>Name</b></td>
<td>Rishikesh Kumar</td>
</tr>
<tr>
<td><b>Reg No</b></td>
<td>24BCE0187</td>
</tr>
</table>

</body>
</html>
