<!DOCTYPE html>
<html>
<head>
<title>Rectangle Area Calculator</title>

<script>
function calculateArea()
{
    var lengthValue = 10;
    var widthValue = 5;

    var areaInteger = lengthValue * widthValue;

    lengthValue = 10.5;
    widthValue = 5.2;

    var areaFloat = lengthValue * widthValue;

    document.getElementById("result").innerHTML =
    "Area using integers: " + areaInteger + "<br>" +
    "Area using floating numbers: " + areaFloat;
}
</script>

<style>
#studentInfo{
position:absolute;
top:10px;
right:10px;
border:1px solid black;
padding:5px;
}
</style>

</head>

<body>

<h2>Rectangle Area Calculator</h2>

<button type="button" onclick="calculateArea()">Calculate Area</button>

<p id="result"></p>
