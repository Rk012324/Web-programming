<!DOCTYPE html>
<html>
<head>
<title>Email Address Generator</title>

<script>
function generateEmail(btn)
{
    var fname = btn.form.fname.value;
    var lname = btn.form.lname.value;

    var email = fname + "." + lname + "@park.edu";

    document.getElementById("result").innerHTML = "Generated Email: " + email;

    btn.form.reset();
    btn.form.fname.focus();
}
</script>
<style>
#studentInfo{
position:absolute;
top:10px;
right:10px;
border:1px solid black;
padding:5px;
}
</style>

</head>

<body>

<h2>Email Address Generator</h2>

<form>
First Name: <input type="text" name="fname"><br><br>
Last Name: <input type="text" name="lname"><br><br>

<button type="button" onclick="generateEmail(this)">Generate Email</button>
</form>

<p id="result"></p>

<table id="studentInfo">
<tr>
<td><b>Name</b></td>
<td>Rishikesh Kumar</td>
</tr>
<tr>
<td><b>Reg No</b></td>
<td>24BCE0187</td>
</tr>
</table>

</body>
</html>
